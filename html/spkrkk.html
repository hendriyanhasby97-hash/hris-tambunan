<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Berkas SPK RKK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Kelola Berkas SPK RKK</h5>
                <button class="btn btn-light btn-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalSpk">
                    + Tambah Berkas
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>No. SPK</th>
                                <th>Tanggal Terbit</th>
                                <th>Tanggal Berakhir</th>
                                <th>File</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbodySpk">
                            <tr>
                                <td colspan="7" class="text-center text-muted">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSpk" tabindex="-1" aria-labelledby="modalSpkLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formSpk" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalSpkLabel">Tambah Berkas SPK RKK</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="spkId" name="id">

                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" name="nik" required>
                        </div>
                        <div class="mb-3">
                            <label for="no_spk" class="form-label">Nomor SPK</label>
                            <input type="text" class="form-control" id="no_spk" name="no_spk" required>
                        </div>
                        <div class="mb-3">
                            <label for="tanggal_terbit" class="form-label">Tanggal Terbit</label>
                            <input type="date" class="form-control" id="tanggal_terbit" name="tanggal_terbit" required>
                        </div>
                        <div class="mb-3">
                            <label for="tanggal_berakhir" class="form-label">Tanggal Berakhir</label>
                            <input type="date" class="form-control" id="tanggal_berakhir" name="tanggal_berakhir" required>
                        </div>
                        <div class="mb-3">
                            <label for="file_url" class="form-label">Lampiran Berkas (PDF/Gambar)</label>
                            <input type="file" class="form-control" id="file_url" name="file_url">
                            <small class="text-muted d-block mt-1">Disimpan ke storage: <code>Lampiran_spkrkk</code></small>
                            <div id="editFilePreview" class="mt-2 text-primary" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary" id="btnSimpan">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../app/koneksi.js"></script>
    
    <script src="js/spkrkk.js"></script>
</body>
</html>
