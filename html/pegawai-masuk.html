<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai Masuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: transparent !important; padding: 20px 10px; }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <!-- Flat Header Seamless -->
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
                <h5 class="mb-0 fw-bold text-dark">Data Master Pegawai Masuk</h5>
                <small class="text-muted">Kelola riwayat penempatan pegawai masuk baru</small>
            </div>
            <button class="btn btn-info btn-sm text-dark fw-bold shadow-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalPegawaiMasuk">
                + Tambah Pegawai Masuk
            </button>
        </div>
        
        <!-- Kontrol Pencarian & Filter -->
        <div class="row mb-3 g-2 align-items-center">
            <div class="col-md-3 col-sm-4">
                <div class="input-group input-group-sm">
                    <label class="input-group-text" for="limitData">Tampilkan</label>
                    <select class="form-select" id="limitData">
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
            <div class="col-md-3 d-none d-md-block"></div>
            <div class="col-md-4 col-sm-5">
                <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari berdasarkan NIK atau Nama...">
            </div>
            <div class="col-md-2 col-sm-3">
                <div class="input-group input-group-sm">
                    <select class="form-select" id="filterTahun">
                        <option value="" selected>Semua Tahun</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tabel Elegan Seamless -->
        <div class="table-responsive border rounded bg-white shadow-sm">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>No</th>
                        <th>NIK</th>
                        <th>Nama</th>
                        <th>Jenis Kelamin</th>
                        <th>Agama</th>
                        <th>Bagian / Ruangan</th>
                        <th>TMT Masuk</th>
                        <th>Pendidikan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbodyPegawaiMasuk">
                    <tr><td colspan="9" class="text-center text-muted">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
            <div id="infoPagination" class="text-muted small">Menampilkan 0 data</div>
            <nav><ul class="pagination pagination-sm mb-0" id="paginationControls"></ul></nav>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="modalPegawaiMasuk" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formPegawaiMasuk">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalPegawaiMasukLabel">Tambah Pegawai Masuk</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="idMasuk" name="id_masuk">
                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" required>
                        </div>
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control" id="nama" required>
                        </div>
                        <div class="mb-3">
                            <label for="jenis_kelamin" class="form-label">Jenis Kelamin</label>
                            <select class="form-select" id="jenis_kelamin" required>
                                <option value="">-- Pilih Jenis Kelamin --</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="agama" class="form-label">Agama</label>
                            <input type="text" class="form-control" id="agama" required>
                        </div>
                        <div class="mb-3">
                            <label for="bagian" class="form-label">Bagian / Unit Kerja</label>
                            <input type="text" class="form-control" id="bagian" required>
                        </div>
                        <div class="mb-3">
                            <label for="tmt_masuk" class="form-label">TMT Masuk</label>
                            <input type="date" class="form-control" id="tmt_masuk" required>
                        </div>
                        <div class="mb-3">
                            <label for="pendidikan" class="form-label">Pendidikan Terakhir</label>
                            <input type="text" class="form-control" id="pendidikan" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-info text-dark" id="btnSimpan">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/pegawai-masuk.js"></script>
</body>
</html>
