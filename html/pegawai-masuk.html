<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pegawai Masuk</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-dark border-0">Data Pegawai Masuk</h5>
                <button class="btn btn-dark btn-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalPegawaiMasuk">
                    + Tambah Pegawai Masuk
                </button>
            </div>
            <div class="card-body">
                
                <!-- Section Pengatur Baris, Pencarian & Filter -->
                <div class="row mb-3 g-2 align-items-center">
                    <!-- Dropdown Baris Per Halaman -->
                    <div class="col-md-3 col-sm-4">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="limitData">Tampilkan</label>
                            <select class="form-select" id="limitData">
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                            <span class="input-group-text">data</span>
                        </div>
                    </div>
                    
                    <div class="col-md-2 d-none d-md-block"></div>

                    <!-- Input Pencarian -->
                    <div class="col-md-4 col-sm-5">
                        <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari berdasarkan NIK atau Nama...">
                    </div>
                    <!-- Dropdown Filter Tahun TMT -->
                    <div class="col-md-3 col-sm-3">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="filterTahun">Tahun TMT</label>
                            <select class="form-select" id="filterTahun">
                                <option value="" selected>Semua</option>
                                <option value="2023">2023</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Tabel Data -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>Nama</th>
                                <th>Jenis Kelamin</th>
                                <th>Agama</th>
                                <th>Bagian / Ruangan</th>
                                <th>TMT Masuk</th>
                                <th>Pendidikan</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyPegawaiMasuk">
                            <tr>
                                <td colspan="9" class="text-center text-muted">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Footer Tabel / Kontrol Pagination -->
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
                    <div id="infoPagination" class="text-muted small">
                        Menampilkan 0 sampai 0 dari 0 data
                    </div>
                    <nav aria-label="Navigasi Halaman">
                        <ul class="pagination pagination-sm mb-0" id="paginationControls">
                            <!-- Di-render via JS -->
                        </ul>
                    </nav>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Form (Tambah / Edit) -->
    <div class="modal fade" id="modalPegawaiMasuk" tabindex="-1" aria-labelledby="modalPegawaiMasukLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formPegawaiMasuk">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalPegawaiMasukLabel">Tambah Pegawai Masuk</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <!-- Hidden ID Masuk untuk proses Edit -->
                        <input type="hidden" id="idMasuk" name="id_masuk">

                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" name="nik" placeholder="Masukkan NIK (Tab/Klik luar untuk cek master data)" required>
                        </div>
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control" id="nama" name="nama" required>
                        </div>
                        <div class="mb-3">
                            <label for="jenis_kelamin" class="form-label">Jenis Kelamin</label>
                            <select class="form-select" id="jenis_kelamin" name="jenis_kelamin" required>
                                <option value="">-- Pilih Jenis Kelamin --</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="agama" class="form-label">Agama</label>
                            <input type="text" class="form-control" id="agama" name="agama" placeholder="Contoh: Islam, Kristen, dll" required>
                        </div>
                        <div class="mb-3">
                            <label for="bagian" class="form-label">Bagian / Unit Kerja</label>
                            <input type="text" class="form-control" id="bagian" name="bagian" placeholder="Contoh: SDM, Rekam Medis, Keuangan" required>
                        </div>
                        <div class="mb-3">
                            <label for="tmt_masuk" class="form-label">TMT Masuk</label>
                            <input type="date" class="form-control" id="tmt_masuk" name="tmt_masuk" required>
                        </div>
                        <div class="mb-3">
                            <label for="pendidikan" class="form-label">Pendidikan Terakhir</label>
                            <input type="text" class="form-control" id="pendidikan" name="pendidikan" placeholder="Contoh: D3 Keperawatan, S1 Kesehatan Masyarakat" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-info text-dark" id="btnSimpan">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- REQUIRED SDK LIBRARIES -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Memanggil file js/pegawai-masuk.js -->
    <script type="module" src="../js/pegawai-masuk.js"></script>
</body>
</html>
