<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD Data Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .summary-box { border-radius: 10px; padding: 20px; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-custom th { background-color: #343a40; color: white; vertical-align: middle; }
        .table-custom td { vertical-align: middle; }
        .text-small { font-size: 0.85em; color: #6c757d; }
    </style>
</head>
<body>

<div class="container-fluid py-4 px-4">
    <h3 class="mb-4 text-center">Sistem Informasi Data Pegawai</h3>

    <div class="row g-3 mb-4 text-center">
        <div class="col-6 col-md-4 col-lg-2">
            <div class="summary-box bg-primary">
                <h3 id="totPegawai">0</h3>
                <span>Total Pegawai</span>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="summary-box bg-success">
                <h3 id="totAktif">0</h3>
                <span>Aktif</span>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="summary-box bg-secondary">
                <h3 id="totPensiun">0</h3>
                <span>Pensiun</span>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="summary-box bg-warning text-dark">
                <h3 id="totResign">0</h3>
                <span>Resign</span>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="summary-box bg-info text-dark">
                <h3 id="totMutasi">0</h3>
                <span>Mutasi</span>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-2">
            <div class="summary-box bg-dark">
                <h3 id="totLainnya">0</h3>
                <span>Lainnya</span>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <form id="formFilter" class="row g-2 align-items-center">
                <div class="col-md-3">
                    <input type="text" id="searchKeyword" class="form-control" placeholder="Cari NIK / Nama...">
                </div>
                <div class="col-md-2">
                    <select id="filterStatus" class="form-select">
                        <option value="">-- Filter Status --</option>
                        <option value="Aktif">Aktif</option>
                        <option value="Pensiun">Pensiun</option>
                        <option value="Resign">Resign</option>
                        <option value="Mutasi">Mutasi</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="filterKelTenaga" class="form-select">
                        <option value="">-- Kelompok Tenaga --</option>
                        <option value="ASN">ASN</option>
                        <option value="APBD">APBD</option>
                        <option value="BLUD">BLUD</option>
                        <option value="Konsultan">Konsultan</option>
                        <option value="Magang">Magang</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="filterKelJabatan" class="form-select">
                        <option value="">-- Kelompok Jabatan --</option>
                        <option value="Struktural">Management</option>
                        <option value="Struktural">Tenaga Medis</option>
                        <option value="Fungsional">Tenaga Kesehatan</option>
                        <option value="Fungsional">Tenaga Penunjang Medis</option>
                        <option value="Fungsional">Tenaga Administrasi</option>
                        <option value="Fungsional">Tenaga Non Administrasi</option>
                    </select>
                </div>
                <div class="col-md-3 text-md-end">
                    <button type="button" class="btn btn-primary w-100 w-md-auto" data-bs-toggle="modal" data-bs-target="#modalPegawai">
                        <i class="fas fa-plus"></i> Tambah Pegawai
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered table-custom mb-0">
                    <thead>
                        <tr>
                            <th width="5%">No</th>
                            <th>NIK <br><span class="fw-normal text-small text-light">NIP</span></th>
                            <th>Nama Lengkap <br><span class="fw-normal text-small text-light">Ruangan</span></th>
                            <th>Status <br><span class="fw-normal text-small text-light">Kel. Jabatan</span></th>
                            <th>Golongan <br><span class="fw-normal text-small text-light">Jabatan</span></th>
                            <th>Fakultas <br><span class="fw-normal text-small text-light">Jurusan</span></th>
                            <th>TMT Masuk <br><span class="fw-normal text-small text-light">Masa Kerja</span></th>
                            <th width="12%" class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
        
        <div class="card-footer d-flex flex-wrap justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2 mb-2 mb-md-0">
                <label for="limitSelect" class="form-label mb-0 text-small">Tampilkan:</label>
                <select id="limitSelect" class="form-select form-select-sm" style="width: 80px;">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <small class="text-muted ms-2" id="paginationInfo">Menampilkan data...</small>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0" id="paginationControls">
                    </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="modalPegawai" tabindex="-1" aria-labelledby="modalPegawaiLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <form id="formPegawai">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalPegawaiLabel">Form Data Pegawai</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bg-light">
                    <ul class="nav nav-tabs mb-3" id="pegawaiTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="profil-tab" data-bs-toggle="tab" data-bs-target="#profil" type="button" role="tab" aria-controls="profil" aria-selected="true">Profil Pribadi</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="kepegawaian-tab" data-bs-toggle="tab" data-bs-target="#kepegawaian" type="button" role="tab" aria-controls="kepegawaian" aria-selected="false">Kepegawaian</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="pendidikan-tab" data-bs-toggle="tab" data-bs-target="#pendidikan" type="button" role="tab" aria-controls="pendidikan" aria-selected="false">Pendidikan</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="lainnya-tab" data-bs-toggle="tab" data-bs-target="#lainnya" type="button" role="tab" aria-controls="lainnya" aria-selected="false">Data Lainnya</button>
                        </li>
                    </ul>

                    <div class="tab-content bg-white p-3 border border-top-0 rounded-bottom" id="pegawaiTabsContent">
                        
                        <div class="tab-pane fade show active" id="profil" role="tabpanel" aria-labelledby="profil-tab">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">NIK <span class="text-danger">*</span></label>
                                    <input type="text" name="nik" class="form-control" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Nama Lengkap <span class="text-danger">*</span></label>
                                    <input type="text" name="nama" class="form-control" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Tempat Lahir</label>
                                    <input type="text" name="tempat_lahir" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Tanggal Lahir</label>
                                    <input type="date" name="tanggal_lahir" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Jenis Kelamin</label>
                                    <select name="jenis_kelamin" class="form-select">
                                        <option value="">--Pilih--</option>
                                        <option value="Laki-laki">Laki-laki</option>
                                        <option value="Perempuan">Perempuan</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Agama</label>
                                    <input type="text" name="agama" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Status Keluarga</label>
                                    <input type="text" name="status_keluarga" class="form-control">
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Alamat Lengkap</label>
                                    <input type="text" name="alamat" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">No. Telp / HP</label>
                                    <input type="text" name="no_telp" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Password Akun</label>
                                    <input type="password" name="password" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="kepegawaian" role="tabpanel" aria-labelledby="kepegawaian-tab">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">NIP</label>
                                    <input type="text" name="nip" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Status Pegawai</label>
                                    <select name="status" class="form-select">
                                        <option value="Aktif">Aktif</option>
                                        <option value="Pensiun">Pensiun</option>
                                        <option value="Resign">Resign</option>
                                        <option value="Mutasi">Mutasi</option>
                                        <option value="Lainnya">Lainnya</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Ruangan</label>
                                    <input type="text" name="ruangan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Kelompok Pegawai</label>
                                    <input type="text" name="kelompok_pegawai" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Kelompok Jabatan</label>
                                    <input type="text" name="kelompok_jabatan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Jabatan</label>
                                    <input type="text" name="jabatan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Golongan</label>
                                    <input type="text" name="gol" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">TMT Pangkat</label>
                                    <input type="date" name="tmt_pangkat" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">TMT Berikutnya</label>
                                    <input type="date" name="tmt_berikutnya" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">TMT CPNS</label>
                                    <input type="date" name="tmt_cpns" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">TMT Masuk RS</label>
                                    <input type="date" name="masuk_rs" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Masa Kerja RS</label>
                                    <input type="text" name="masa_kerja_rs" class="form-control" placeholder="Cth: 3 Tahun 2 Bulan">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Rentang BUP</label>
                                    <input type="text" name="rentang_bup" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">TMT Pensiun</label>
                                    <input type="date" name="tmt_pensiun" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="pendidikan" role="tabpanel" aria-labelledby="pendidikan-tab">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Jenjang Pendidikan</label>
                                    <input type="text" name="jenjang" class="form-control" placeholder="Cth: S1, D3">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Fakultas</label>
                                    <input type="text" name="fakultas" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Jurusan</label>
                                    <input type="text" name="jurusan" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="lainnya" role="tabpanel" aria-labelledby="lainnya-tab">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">No. BPJS Kesehatan</label>
                                    <input type="text" name="no_bpjsn" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">No. BPJS Ketenagakerjaan / Taspen</label>
                                    <input type="text" name="no_bpjsket_taspen" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">NPWP</label>
                                    <input type="text" name="npwp" class="form-control">
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan Data Pegawai</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="modal fade" id="modalDetailPegawai" tabindex="-1" aria-labelledby="modalDetailLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title" id="modalDetailLabel">Detail Lengkap Pegawai</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="detailBody" style="max-height: 70vh; overflow-y: auto;">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
            </div>
        </div>
    </div>
</div>
<script type="module" src="../app/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
