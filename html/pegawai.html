<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD Data Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">Sistem Informasi Data Pegawai</h2>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Form Input Pegawai</h5>
        </div>
        <div class="card-body">
            <form id="formPegawai">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label>NIK</label>
                        <input type="text" name="nik" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label>NIP</label>
                        <input type="text" name="nip" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" required>
                    </div>

                    <div class="col-md-3">
                        <label>Tempat Lahir</label>
                        <input type="text" name="tempat_lahir" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Tanggal Lahir</label>
                        <input type="date" name="tanggal_lahir" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Jenis Kelamin</label>
                        <select name="jenis_kelamin" class="form-select">
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>Agama</label>
                        <input type="text" name="agama" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>Status Keluarga</label>
                        <input type="text" name="status_keluarga" class="form-control">
                    </div>
                    <div class="col-md-9">
                        <label>Alamat</label>
                        <input type="text" name="alamat" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>Status Pegawai</label>
                        <input type="text" name="status" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Kel. Pegawai</label>
                        <input type="text" name="kelompok_pegawai" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Kel. Jabatan</label>
                        <input type="text" name="kelompok_jabatan" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Jabatan</label>
                        <input type="text" name="jabatan" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>Golongan</label>
                        <input type="text" name="gol" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>TMT Pangkat</label>
                        <input type="date" name="tmt_pangkat" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>TMT Berikutnya</label>
                        <input type="date" name="tmt_berikutnya" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Ruangan</label>
                        <input type="text" name="ruangan" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>TMT CPNS</label>
                        <input type="date" name="tmt_cpns" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Masuk RS</label>
                        <input type="date" name="masuk_rs" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Masa Kerja RS</label>
                        <input type="text" name="masa_kerja_rs" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Rentang BUP</label>
                        <input type="text" name="rentang_bup" class="form-control">
                    </div>
                    
                    <div class="col-md-3">
                        <label>TMT Pensiun</label>
                        <input type="date" name="tmt_pensiun" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>Jenjang</label>
                        <input type="text" name="jenjang" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Fakultas</label>
                        <input type="text" name="fakultas" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>Jurusan</label>
                        <input type="text" name="jurusan" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>No BPJS Kesehatan</label>
                        <input type="text" name="no_bpjsn" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>No BPJS Ket/Taspen</label>
                        <input type="text" name="no_bpjsket_taspen" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>NPWP</label>
                        <input type="text" name="npwp" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label>No. Telepon</label>
                        <input type="text" name="no_telp" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-success" id="btnSubmit">Simpan Data</button>
                    <button type="reset" class="btn btn-secondary" id="btnReset">Batal / Reset</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Daftar Pegawai</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>No</th>
                            <th>NIP</th>
                            <th>Nama Lengkap</th>
                            <th>Jabatan</th>
                            <th>No. Telp</th>
                            <th width="150">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
