<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel Sistem Manajemen SDM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e2229 0%, #0d6efd 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            padding: 35px 30px;
        }
        .brand-icon {
            font-size: 45px;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 10px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .btn-login {
            background-color: #0d6efd;
            border: none;
            font-weight: 600;
            padding: 10px;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #0b5ed7;
        }
        .input-group-text {
            cursor: pointer;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-icon">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h5 class="fw-bold text-dark mb-1">SISTEM INFORMASI SDM</h5>
            <p class="text-muted small">Silakan masuk untuk mengelola portal administrasi</p>
        </div>

        <div class="alert alert-danger d-none small py-2" id="loginAlert" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> <span id="alertMessage">Gagal masuk!</span>
        </div>

        <form id="formLogin">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-secondary">NIK / Username / Email</label>
                <div class="input-group">
                    <span class="input-group-text text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Masukkan NIK atau Email" required autocomplete="off">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text text-muted"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
                    <span class="input-group-text text-muted" id="togglePassword" title="Lihat Password">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-login d-flex align-items-center justify-content-center gap-2" id="btnLogin">
                    <span id="btnText">MASUK SISTEM</span>
                    <div class="spinner-border spinner-border-sm d-none" id="btnSpinner" role="status"></div>
                </button>
            </div>
        </form>

        <div class="text-center mt-4 border-top pt-3">
            <small class="text-muted">&copy; 2026 db_pegawai - All Rights Reserved</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
