<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Berkas STR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">Kelola Berkas STR (Surat Tanda Registrasi)</h5>
                <button class="btn btn-dark btn-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalStr">+ Tambah STR</button>
            </div>
            <div class="card-body">
                <div class="row mb-3 g-2 align-items-center">
                    <div class="col-md-3 col-sm-4">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="limitData">Tampilkan</label>
                            <select class="form-select" id="limitData">
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2 d-none d-md-block"></div>
                    <div class="col-md-4 col-sm-5">
                        <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari NIK / Nama...">
                    </div>
                    <div class="col-md-3 col-sm-3">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="filterTahun">Tahun Terbit</label>
                            <select class="form-select" id="filterTahun">
                                <option value="" selected>Semua</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>Nama</th>
                                <th>Bidang</th>
                                <th>No. STR</th>
                                <th>Tgl Terbit</th>
                                <th>Tgl Berakhir</th>
                                <th>File</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyStr">
                            <tr><td colspan="9" class="text-center text-muted">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
                    <div id="infoPagination" class="text-muted small">Menampilkan 0 data</div>
                    <nav><ul class="pagination pagination-sm mb-0" id="paginationControls"></ul></nav>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalStr" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formStr" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalStrLabel">Tambah Berkas STR</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="strId" name="id_str">
                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" required>
                        </div>
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control bg-light" id="nama" readonly required>
                        </div>
                        <div class="mb-3">
                            <label for="bidang" class="form-label">Bidang/Profesi</label>
                            <input type="text" class="form-control" id="bidang" required>
                        </div>
                        <div class="mb-3">
                            <label for="no_str" class="form-label">Nomor STR</label>
                            <input type="text" class="form-control" id="no_str" required>
                        </div>
                        <div class="mb-3">
                            <label for="tgl_terbit" class="form-label">Tanggal Terbit</label>
                            <input type="date" class="form-control" id="tgl_terbit" required>
                        </div>
                        <div class="mb-3">
                            <label for="tgl_berakhir" class="form-label">Tanggal Berakhir</label>
                            <input type="date" class="form-control" id="tgl_berakhir" required>
                        </div>
                        <div class="mb-3">
                            <label for="file_url" class="form-label">Lampiran Berkas (PDF/Gambar)</label>
                            <input type="file" class="form-control" id="file_url">
                            <div id="editFilePreview" class="mt-2 text-warning" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-warning text-dark fw-bold" id="btnSimpan">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/str.js"></script>
</body>
</html>
