<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKP Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Kelola Berkas SKP Pegawai</h5>
                <button class="btn btn-light btn-sm shadow-sm text-dark" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalSkp">+ Tambah SKP</button>
            </div>
            <div class="card-body">
                <div class="row mb-3 g-2 align-items-center">
                    <div class="col-md-3 col-sm-4">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="limitData">Tampilkan</label>
                            <select class="form-select" id="limitData">
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2 d-none d-md-block"></div>
                    <div class="col-md-4 col-sm-5">
                        <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari NIK / Nama...">
                    </div>
                    <div class="col-md-3 col-sm-3">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="filterTahun">Tahun SKP</label>
                            <select class="form-select" id="filterTahun">
                                <option value="" selected>Semua</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>Nama / NIP</th>
                                <th>Jabatan</th>
                                <th>Tahun</th>
                                <th>Penilai</th>
                                <th>Capaian Org</th>
                                <th>Predikat Kerja</th>
                                <th>File</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbodySkp">
                            <tr><td colspan="10" class="text-center text-muted">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
                    <div id="infoPagination" class="text-muted small">Menampilkan 0 data</div>
                    <nav><ul class="pagination pagination-sm mb-0" id="paginationControls"></ul></nav>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSkp" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form id="formSkp" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalSkpLabel">Tambah Berkas SKP</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="skpId" name="id">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label for="nik" class="form-label">NIK Pegawai</label>
                                <input type="text" class="form-control" id="nik" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label for="nama" class="form-label">Nama Pegawai</label>
                                <input type="text" class="form-control bg-light" id="nama" readonly required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label for="nip" class="form-label">NIP</label>
                                <input type="text" class="form-control bg-light" id="nip" readonly required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label for="jabatan" class="form-label">Jabatan</label>
                                <input type="text" class="form-control bg-light" id="jabatan" readonly required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label for="pejabat_penilai" class="form-label">Nama Pejabat Penilai</label>
                                <input type="text" class="form-control" id="pejabat_penilai" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label for="atasan_pejabat_penilai" class="form-label">Nama Atasan Pejabat Penilai</label>
                                <input type="text" class="form-control" id="atasan_pejabat_penilai" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <label for="tahun_skp" class="form-label">Tahun SKP</label>
                                <input type="number" class="form-control" id="tahun_skp" min="2020" max="2035" required>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label for="capaian_kinerja_organisasi" class="form-label">Capaian Kinerja Organisasi</label>
                                <input type="text" class="form-control" id="capaian_kinerja_organisasi" placeholder="Contoh: Baik / Istimewa" required>
                            </div>
                            <div class="col-md-4 mb-2">
                                <label for="predikat_kinerja_pegawai" class="form-label">Predikat Kinerja Pegawai</label>
                                <input type="text" class="form-control" id="predikat_kinerja_pegawai" placeholder="Contoh: Sangat Baik / Baik" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label for="catatan_rekomendasi" class="form-label">Catatan Rekomendasi</label>
                            <textarea class="form-control" id="catatan_rekomendasi" rows="2"></textarea>
                        </div>
                        <div class="mb-2">
                            <label for="lampiran_skp" class="form-label">File Lampiran SKP (PDF/Gambar)</label>
                            <input type="file" class="form-control" id="lampiran_skp">
                            <div id="editFilePreview" class="mt-2 text-dark font-weight-bold" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-dark" id="btnSimpan">Simpan SKP</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/skp.js"></script>
</body>
</html>
