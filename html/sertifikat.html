<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Kelola Sertifikat Pelatihan Pegawai</h5>
                <button class="btn btn-light btn-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalSertifikat">+ Tambah Sertifikat</button>
            </div>
            <div class="card-body">
                <div class="row mb-3 g-2 align-items-center">
                    <div class="col-md-3 col-sm-4">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="limitData">Tampilkan</label>
                            <select class="form-select" id="limitData">
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2 d-none d-md-block"></div>
                    <div class="col-md-4 col-sm-5">
                        <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari NIK / Nama...">
                    </div>
                    <div class="col-md-3 col-sm-3">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="filterTahun">Tahun Pelaksanaan</label>
                            <select class="form-select" id="filterTahun">
                                <option value="" selected>Semua</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>Nama</th>
                                <th>No. Sertifikat</th>
                                <th>Jenis</th>
                                <th>Judul Kegiatan</th>
                                <th>Tgl Pelaksanaan</th>
                                <th>JPL</th>
                                <th>SKP</th>
                                <th>File</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbodySertifikat">
                            <tr><td colspan="11" class="text-center text-muted">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
                    <div id="infoPagination" class="text-muted small">Menampilkan 0 data</div>
                    <nav><ul class="pagination pagination-sm mb-0" id="paginationControls"></ul></nav>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSertifikat" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formSertifikat" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalSertifikatLabel">Tambah Sertifikat</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="sertifikatId" name="id">
                        <div class="mb-2">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" required>
                        </div>
                        <div class="mb-2">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control bg-light" id="nama" readonly required>
                        </div>
                        <div class="mb-2">
                            <label for="no_sertifikat" class="form-label">Nomor Sertifikat</label>
                            <input type="text" class="form-control" id="no_sertifikat" required>
                        </div>
                        <div class="mb-2">
                            <label for="jenis_sertifikat" class="form-label">Jenis Sertifikat</label>
                            <input type="text" class="form-control" id="jenis_sertifikat" placeholder="Contoh: Pelatihan, Workshop, Webinar" required>
                        </div>
                        <div class="mb-2">
                            <label for="judul_kegiatan" class="form-label">Judul Kegiatan</label>
                            <input type="text" class="form-control" id="judul_kegiatan" required>
                        </div>
                        <div class="mb-2">
                            <label for="tanggal_pelaksanaan" class="form-label">Tanggal Utama Pelaksanaan</label>
                            <input type="date" class="form-control" id="tanggal_pelaksanaan" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-2">
                                <label for="mulai" class="form-label">Tgl Mulai</label>
                                <input type="date" class="form-control" id="mulai" required>
                            </div>
                            <div class="col-6 mb-2">
                                <label for="selesai" class="form-label">Tgl Selesai</label>
                                <input type="date" class="form-control" id="selesai" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-2">
                                <label for="jpl" class="form-label">Jumlah JPL</label>
                                <input type="number" class="form-control" id="jpl" required>
                            </div>
                            <div class="col-6 mb-2">
                                <label for="skp" class="form-label">Nilai SKP Kemenkes</label>
                                <input type="number" step="0.1" class="form-control" id="skp" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label for="file_sertifikat" class="form-label">File Sertifikat (PDF/Gambar)</label>
                            <input type="file" class="form-control" id="file_sertifikat">
                            <div id="editFilePreview" class="mt-2 text-success" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success" id="btnSimpan">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/sertifikat.js"></script>
</body>
</html>
