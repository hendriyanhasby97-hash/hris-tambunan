<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Berkas OPPE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Kelola Berkas OPPE</h5>
                <button class="btn btn-light btn-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalOppe">
                    + Tambah Berkas OPPE
                </button>
            </div>
            <div class="card-body">
                
                <div class="row mb-3 g-2 align-items-center">
                    <div class="col-md-3 col-sm-4">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="limitData">Tampilkan</label>
                            <select class="form-select" id="limitData">
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                            <span class="input-group-text">data</span>
                        </div>
                    </div>
                    
                    <div class="col-md-2 d-none d-md-block"></div>

                    <div class="col-md-4 col-sm-5">
                        <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari berdasarkan NIK atau Nama...">
                    </div>
                    <div class="col-md-3 col-sm-3">
                        <div class="input-group input-group-sm">
                            <label class="input-group-text" for="filterTahun">Tahun</label>
                            <select class="form-select" id="filterTahun">
                                <option value="" selected>Semua</option>
                                <option value="2023">2023</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>NIK</th>
                                <th>Nama</th>
                                <th>Tahun</th>
                                <th>Nilai ABC</th>
                                <th>Nilai Rata-Rata</th>
                                <th>Kesimpulan</th>
                                <th>File</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyOppe">
                            <tr>
                                <td colspan="9" class="text-center text-muted">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
                    <div id="infoPagination" class="text-muted small">
                        Menampilkan 0 sampai 0 dari 0 data
                    </div>
                    <nav aria-label="Navigasi Halaman">
                        <ul class="pagination pagination-sm mb-0" id="paginationControls">
                            </ul>
                    </nav>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalOppe" tabindex="-1" aria-labelledby="modalOppeLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formOppe" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalOppeLabel">Tambah Berkas OPPE</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="oppeId" name="id">

                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" name="nik" placeholder="Masukkan NIK lalu klik luar/tab" required>
                        </div>
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control bg-light" id="nama" name="nama" readonly required>
                        </div>
                        <div class="mb-3">
                            <label for="tahun" class="form-label">Tahun Penilaian</label>
                            <input type="number" class="form-control" id="tahun" name="tahun" min="2020" max="2035" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nilai_abc" class="form-label">Nilai ABC</label>
                                <input type="text" class="form-control" id="nilai_abc" name="nilai_abc" placeholder="Contoh: A/B/C atau nilai angka" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="nilai_ratarata" class="form-label">Nilai Rata-Rata</label>
                                <input type="number" step="0.01" class="form-control" id="nilai_ratarata" name="nilai_ratarata" placeholder="Contoh: 85.50" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="kesimpulan" class="form-label">Kesimpulan</label>
                            <textarea class="form-control" id="kesimpulan" name="kesimpulan" rows="2" placeholder="Contoh: Sangat Baik / Cukup" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="file_url" class="form-label">Lampiran Berkas OPPE (PDF/Gambar)</label>
                            <input type="file" class="form-control" id="file_url" name="file_url">
                            <small class="text-muted d-block mt-1">Disimpan ke storage: <code>lampiran_oppe</code></small>
                            <div id="editFilePreview" class="mt-2 text-success" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success" id="btnSimpan">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/oppe.js"></script>
</body>
</html>
