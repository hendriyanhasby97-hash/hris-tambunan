<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Berkas OPPE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: transparent !important; padding: 20px 10px; }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
                <h5 class="mb-0 fw-bold text-dark">Data Evaluasi Praktik Profesional (OPPE)</h5>
                <small class="text-muted">Pencatatan rincian indeks pencapaian mutu kerja tahunan staf medis</small>
            </div>
            <button class="btn btn-success btn-sm shadow-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalOppe">
                + Tambah Berkas OPPE
            </button>
        </div>
        
        <!-- Toolbar Aksi IO, Filter & Cari -->
        <div class="row mb-3 g-2 align-items-center">
            <div class="col-md-2 col-sm-4">
                <div class="input-group input-group-sm">
                    <label class="input-group-text" for="limitData">Tampilkan</label>
                    <select class="form-select" id="limitData">
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
            <div class="col-md-5 col-sm-8 d-flex gap-1 flex-wrap">
                <button type="button" class="btn btn-outline-success btn-sm" id="btnExportExcel">💾 Excel</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="btnExportCsv"><code>,</code> CSV</button>
                <button type="button" class="btn btn-outline-danger btn-sm" id="btnExportPdf">📄 PDF</button>
                <button type="button" class="btn btn-dark btn-sm ms-auto" id="btnTriggerImport">📥 Import File</button>
                <input type="file" id="inputImportFile" class="d-none" accept=".xlsx, .xls, .csv">
            </div>
            <div class="col-md-3 col-sm-7">
                <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari NIK atau Nama...">
            </div>
            <div class="col-md-2 col-sm-5">
                <select class="form-select form-select-sm" id="filterTahun">
                    <option value="" selected>Semua Tahun</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
        </div>

        <div class="table-responsive border rounded bg-white shadow-sm">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>No</th>
                        <th>NIK</th>
                        <th>Nama</th>
                        <th>Tahun</th>
                        <th>Nilai ABC</th>
                        <th>Nilai Rata-Rata</th>
                        <th>Kesimpulan</th>
                        <th>File</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbodyOppe">
                    <tr><td colspan="9" class="text-center text-muted">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
            <div id="infoPagination" class="text-muted small">Menampilkan 0 data</div>
            <nav><ul class="pagination pagination-sm mb-0" id="paginationControls"></ul></nav>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="modalOppe" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formOppe" enctype="multipart/form-data">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalOppeLabel">Tambah Berkas OPPE</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="oppeId" name="id">
                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" required>
                        </div>
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control bg-light" id="nama" readonly required>
                        </div>
                        <div class="mb-3">
                            <label for="tahun" class="form-label">Tahun Penilaian</label>
                            <input type="number" class="form-control" id="tahun" min="2020" max="2035" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nilai_abc" class="form-label">Nilai ABC</label>
                                <input type="text" class="form-control" id="nilai_abc" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="nilai_ratarata" class="form-label">Nilai Rata-Rata</label>
                                <input type="number" step="0.01" class="form-control" id="nilai_ratarata" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="kesimpulan" class="form-label">Kesimpulan</label>
                            <textarea class="form-control" id="kesimpulan" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="file_url" class="form-label">Lampiran Berkas OPPE</label>
                            <input type="file" class="form-control" id="file_url">
                            <div id="editFilePreview" class="mt-2 text-success" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-success" id="btnSimpan">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script IO & Engine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="../js/oppe.js"></script>
</body>
</html>
