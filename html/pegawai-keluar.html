<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai Keluar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: transparent !important; padding: 20px 10px; }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <div>
                <h5 class="mb-0 fw-bold text-dark">Data Riwayat Pegawai Keluar</h5>
                <small class="text-muted">Kelola pencatatan berkas pegawai keluar / pensiun / mutasi</small>
            </div>
            <button class="btn btn-danger btn-sm shadow-sm" id="btnTambah" data-bs-toggle="modal" data-bs-target="#modalPegawaiKeluar">
                + Tambah Pegawai Keluar
            </button>
        </div>
        
        <!-- Toolbar Aksi IO, Filter & Cari -->
        <div class="row mb-3 g-2 align-items-center">
            <div class="col-md-2 col-sm-4">
                <div class="input-group input-group-sm">
                    <label class="input-group-text" for="limitData">Tampilkan</label>
                    <select class="form-select" id="limitData">
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
            <div class="col-md-5 col-sm-8 d-flex gap-1 flex-wrap">
                <button type="button" class="btn btn-outline-success btn-sm" id="btnExportExcel">💾 Excel</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="btnExportCsv"><code>,</code> CSV</button>
                <button type="button" class="btn btn-outline-danger btn-sm" id="btnExportPdf">📄 PDF</button>
                <button type="button" class="btn btn-dark btn-sm ms-auto" id="btnTriggerImport">📥 Import File</button>
                <input type="file" id="inputImportFile" class="d-none" accept=".xlsx, .xls, .csv">
            </div>
            <div class="col-md-3 col-sm-7">
                <input type="text" class="form-control form-control-sm" id="inputCari" placeholder="Cari NIK atau Nama...">
            </div>
            <div class="col-md-2 col-sm-5">
                <select class="form-select form-select-sm" id="filterTahun">
                    <option value="" selected>Semua Tahun</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
        </div>

        <div class="table-responsive border rounded bg-white shadow-sm">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>No</th>
                        <th>NIK</th>
                        <th>Nama</th>
                        <th>Bagian</th>
                        <th>Unit Tugas</th>
                        <th>TMT Keluar</th>
                        <th>Jenis Keluar</th>
                        <th>Keterangan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbodyPegawaiKeluar">
                    <tr><td colspan="9" class="text-center text-muted">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mt-3 gap-2">
            <div id="infoPagination" class="text-muted small">Menampilkan 0 data</div>
            <nav><ul class="pagination pagination-sm mb-0" id="paginationControls"></ul></nav>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="modalPegawaiKeluar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formPegawaiKeluar">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalPegawaiKeluarLabel">Tambah Pegawai Keluar</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="idKeluar" name="id_keluar">
                        <div class="mb-3">
                            <label for="nik" class="form-label">NIK Pegawai</label>
                            <input type="text" class="form-control" id="nik" required>
                        </div>
                        <div class="mb-3">
                            <label for="nama" class="form-label">Nama Pegawai</label>
                            <input type="text" class="form-control" id="nama" required>
                        </div>
                        <div class="mb-3">
                            <label for="bagian" class="form-label">Bagian</label>
                            <input type="text" class="form-control" id="bagian" required>
                        </div>
                        <div class="mb-3">
                            <label for="unit_tugas" class="form-label">Unit Tugas</label>
                            <input type="text" class="form-control" id="unit_tugas" required>
                        </div>
                        <div class="mb-3">
                            <label for="tmt_keluar" class="form-label">TMT Keluar</label>
                            <input type="date" class="form-control" id="tmt_keluar" required>
                        </div>
                        <div class="mb-3">
                            <label for="jenis_keluar" class="form-label">Jenis Keluar</label>
                            <select class="form-select" id="jenis_keluar" required>
                                <option value="">-- Pilih Jenis Keluar --</option>
                                <option value="Pensiun">Pensiun</option>
                                <option value="Resign (Mengundurkan Diri)">Resign (Mengundurkan Diri)</option>
                                <option value="Pindah Instansi/Mutasi">Pindah Instansi/Mutasi</option>
                                <option value="Pemutusan Hubungan Kerja (PHK)">Pemutusan Hubungan Kerja (PHK)</option>
                                <option value="Meninggal Dunia">Meninggal Dunia</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="keterangan" class="form-label">Keterangan Alasan</label>
                            <textarea class="form-control" id="keterangan" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-danger" id="btnSimpan">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script IO & Engine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script type="module" src="../js/pegawai-keluar.js"></script>
</body>
</html>
