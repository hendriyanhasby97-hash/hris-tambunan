<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Multi-Role - Sistem Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4 fw-bold text-dark">Login HRIS</h4>
                        
                        <form id="form-login">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold text-secondary">Username</label>
                                <input type="text" id="username" class="form-control form-control-lg fs-6" placeholder="Masukkan username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold text-secondary">Password</label>
                                <input type="password" id="password" class="form-control form-control-lg fs-6" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg fs-6 mt-2">Masuk</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Jika sudah login sebelumnya, langsung lempar ke Dashboard
        document.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('hris_session');
            if (session) {
                window.location.href = 'Layout/index.html';
            }
        });

        // Event Handler Login Matcher
        document.getElementById('form-login').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            let userSession = null;

            // Cek Kredensial Superadmin
            if (username === 'superadmin' && password === 'superadminhris123') {
                userSession = { username: 'Super Admin', role: 'superadmin' };
            } 
            // Cek Kredensial Admin biasa
            else if (username === 'admin' && password === 'admin123') {
                userSession = { username: 'Admin HRD', role: 'admin' };
            }

            if (userSession) {
                // Simpan tiket masuk buatan kita ke local storage browser
                localStorage.setItem('hris_session', JSON.stringify(userSession));
                window.location.href = 'Layout/index.html'; 
            } else {
                alert('Username atau Password salah! Periksa kembali kredensial Anda.');
            }
        });
    </script>
</body>
</html>
