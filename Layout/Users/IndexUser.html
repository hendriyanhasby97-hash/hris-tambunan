<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between">
                        <h5 class="mb-0">Profil Pegawai</h5>
                        <button id="btn-logout-user" class="btn btn-sm btn-light text-danger">Logout</button>
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tbody>
                                <tr>
                                    <th width="30%">Nama</th>
                                    <td width="5%">:</td>
                                    <td id="user-nama">Memuat...</td>
                                </tr>
                                <tr>
                                    <th>NIP</th>
                                    <td>:</td>
                                    <td id="user-nip">Memuat...</td>
                                </tr>
                                <tr>
                                    <th>Jabatan</th>
                                    <td>:</td>
                                    <td id="user-jabatan">Memuat...</td>
                                </tr>
                                <tr>
                                    <th>Ruangan</th>
                                    <td>:</td>
                                    <td id="user-ruangan">Memuat...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../../App/App.js"></script>
    <script type="module" src="./IndexUser.js"></script>
    <script type="module">
        import { supabase } from '../../App/koneksi.js';
        
        document.getElementById('btn-logout-user').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });
    </script>
</body>
</html>
