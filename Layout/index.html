<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #sidebar-wrapper { width: 250px; transition: margin 0.25s ease-out; }
        .sidebar-hidden { margin-left: -250px; }
    </style>
</head>
<body class="bg-light">
    <div class="d-flex min-vh-100" id="wrapper">
        
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="p-3 border-bottom text-center fw-bold fs-5">Sistem Pegawai</div>
            <div class="list-group list-group-flush mt-3">
                <a href="index.html" class="list-group-item list-group-item-action bg-dark text-white active">Dashboard</a>
                <a href="Employee/index.html" class="list-group-item list-group-item-action bg-dark text-white border-0">Data Pegawai</a>
            </div>
        </div>

        <div class="w-100">
            <nav class="navbar navbar-light bg-white shadow-sm px-3 mb-4">
                <button class="btn btn-outline-dark btn-sm" id="btn-toggle">☰ Menu</button>
                <button class="btn btn-danger btn-sm" onclick="logoutApp('../index.html')">Logout</button>
            </nav>

            <div class="container-fluid px-4">
                <h4>Dashboard Statistik</h4>
                <div class="row mt-4">
                    <div class="col-md-6 mb-3">
                        <div class="card p-3 shadow-sm">
                            <h5>Grafik Jenis Kelamin</h5>
                            <canvas id="chartJenisKelamin"></canvas>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card p-3 shadow-sm">
                            <h5>Distribusi Ruangan</h5>
                            <canvas id="chartRuangan"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Logika Sembunyikan Sidebar
        document.getElementById('btn-toggle').addEventListener('click', () => {
            document.getElementById('sidebar-wrapper').classList.toggle('sidebar-hidden');
        });
    </script>
    <script type="module" src="../App/App.js"></script>
    <script type="module">
        import { Dashboard } from './Dashboar.js';
        Dashboard.renderCharts();
    </script>
</body>
</html>
