<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manajemen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sistem Pegawai</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/Layout/index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/Layout/Employee/index.html">Data Pegawai</a></li>
                </ul>
                <div class="d-flex align-items-center text-white">
                    <span id="user-email" class="me-3"></span>
                    <button id="btn-logout" class="btn btn-danger btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Dashboard Statistik</h2>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h5>Grafik Jenis Kelamin</h5>
                    <canvas id="chartJenisKelamin"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h5>Distribusi Ruangan</h5>
                    <canvas id="chartRuangan"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../App/App.js"></script>
    <script type="module" src="./index.js"></script>
    <script type="module">
        import { Dashboard } from './Dashboar.js';
        Dashboard.renderCharts();
    </script>
</body>
</html>
