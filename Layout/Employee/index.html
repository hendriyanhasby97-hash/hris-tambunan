<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #sidebar-wrapper { width: 250px; transition: margin 0.25s ease-out; }
        .sidebar-hidden { margin-left: -250px; }
    </style>
</head>
<body class="bg-light">
    <div class="d-flex min-vh-100" id="wrapper">
        
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="p-3 border-bottom text-center fw-bold fs-5">Sistem Pegawai</div>
            <div class="list-group list-group-flush mt-3">
                <a href="../index.html" class="list-group-item list-group-item-action bg-dark text-white border-0">Dashboard</a>
                <a href="index.html" class="list-group-item list-group-item-action bg-dark text-white active">Data Pegawai</a>
            </div>
        </div>

        <div class="w-100">
            <nav class="navbar navbar-light bg-white shadow-sm px-3 mb-4">
                <button class="btn btn-outline-dark btn-sm" id="btn-toggle">☰ Menu</button>
                <button class="btn btn-danger btn-sm" onclick="logoutApp('../../index.html')">Logout</button>
            </nav>

            <div class="container-fluid px-4">
                <div class="d-flex justify-content-between mb-3">
                    <h4>Daftar Pegawai</h4>
                    <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalPegawai">+ Tambah Data</button>
                </div>

                <div class="card shadow-sm p-3">
                    <div class="table-responsive">
                        <table class="table table-striped" id="tabel-pegawai">
                            <thead class="table-dark">
                                <tr>
                                    <th>NIP/NIK</th>
                                    <th>Nama</th>
                                    <th>Jabatan</th>
                                    <th>Ruangan</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPegawai" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Form Pegawai</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-pegawai">
                        <div class="mb-2"><label>NIK / NIP</label><input type="text" id="nik" class="form-control"></div>
                        <div class="mb-2"><label>Nama Lengkap</label><input type="text" id="nama" class="form-control" required></div>
                        <div class="mb-2"><label>Jenis Kelamin</label>
                            <select id="jeniskelamin" class="form-control">
                                <option value="Pria">Pria</option>
                                <option value="Wanita">Wanita</option>
                            </select>
                        </div>
                        <div class="mb-2"><label>Jabatan</label><input type="text" id="jabatan" class="form-control"></div>
                        <div class="mb-2"><label>Ruangan</label><input type="text" id="ruangan" class="form-control"></div>
                        <button type="submit" class="btn btn-primary mt-3 w-100">Simpan</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('btn-toggle').addEventListener('click', () => {
            document.getElementById('sidebar-wrapper').classList.toggle('sidebar-hidden');
        });
    </script>
    <script type="module" src="../../App/App.js"></script>
    <script type="module">
        import { EmployeeCRUD } from './employee.js';
        
        async function loadData() {
            const tbody = document.querySelector('#tabel-pegawai tbody');
            const data = await EmployeeCRUD.getAll();
            tbody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center">Data kosong.</td></tr>`;
                return;
            }

            data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.nik || '-'}</td>
                        <td>${p.nama}</td>
                        <td>${p.jabatan || '-'}</td>
                        <td>${p.ruangan || '-'}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="hapusData('${p.id_pegawai}')">Hapus</button>
                        </td>
                    </tr>`;
            });
        }

        window.hapusData = async (id) => {
            if(confirm('Hapus data ini?')) {
                await EmployeeCRUD.delete(id);
                loadData();
            }
        };

        document.getElementById('form-pegawai').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                nik: document.getElementById('nik').value,
                nama: document.getElementById('nama').value,
                jeniskelamin: document.getElementById('jeniskelamin').value,
                jabatan: document.getElementById('jabatan').value,
                ruangan: document.getElementById('ruangan').value,
            };
            await EmployeeCRUD.create(payload);
            bootstrap.Modal.getInstance(document.getElementById('modalPegawai')).hide();
            document.getElementById('form-pegawai').reset();
            loadData();
        });

        loadData();
    </script>
</body>
</html>
