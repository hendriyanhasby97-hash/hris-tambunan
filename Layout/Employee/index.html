<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/Layout/index.html">⬅ Kembali ke Dashboard</a>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Daftar Pegawai</h3>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalPegawai">
                + Tambah Pegawai
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped" id="tabel-pegawai">
                <thead class="table-dark">
                    <tr>
                        <th>NIP/NIK</th>
                        <th>Nama</th>
                        <th>Jabatan</th>
                        <th>Ruangan</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalPegawai" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Form Data Pegawai</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="form-pegawai">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label>NIK</label><input type="text" id="nik" class="form-control">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>NIP</label><input type="text" id="nip" class="form-control">
                            </div>
                            <div class="col-md-12 mb-2">
                                <label>Nama Lengkap</label><input type="text" id="nama" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>Jabatan</label><input type="text" id="jabatan" class="form-control">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>Ruangan</label><input type="text" id="ruangan" class="form-control">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>Email</label><input type="email" id="email" class="form-control">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>No HP</label><input type="text" id="nohp" class="form-control">
                            </div>
                            </div>
                        <div class="mt-3 text-end">
                            <button type="submit" class="btn btn-primary">Simpan Data</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../App/App.js"></script>
    <script type="module">
        import { EmployeeCRUD } from './employee.js';
        
        // Logika sederhana untuk render tabel
        async function loadData() {
    const tbody = document.querySelector('#tabel-pegawai tbody');
    try {
        const data = await EmployeeCRUD.getAll();
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center">Belum ada data pegawai. Silakan klik tombol "Tambah Pegawai".</td></tr>`;
        } else {
            data.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.nip || p.nik || '-'}</td>
                        <td>${p.nama}</td>
                        <td>${p.jabatan || '-'}</td>
                        <td>${p.ruangan || '-'}</td>
                        <td>${p.status || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editData('${p.id_pegawai}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="hapusData('${p.id_pegawai}')">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }
    } catch (error) {
        alert("Gagal memuat data: " + error.message);
    }
}
// Menangani submit form tambah pegawai
document.getElementById('form-pegawai').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Ambil data dari form menggunakan fungsi di employee.js
    const dataPegawai = EmployeeCRUD.getFormData();
    
    try {
        await EmployeeCRUD.create(dataPegawai);
        alert('Data berhasil disimpan!');
        
        // Tutup modal
        const modal = bootstrap.Modal.getInstance(document.getElementById('modalPegawai'));
        modal.hide();
        
        // Reset form & Refresh tabel
        document.getElementById('form-pegawai').reset();
        loadData(); 
    } catch (error) {
        alert('Gagal menyimpan: ' + error.message);
    }
});
        // Jalankan saat halaman dibuka
        document.addEventListener('DOMContentLoaded', loadData);
        
        // Expose fungsi ke window agar bisa dipanggil oleh onclick HTML
        window.hapusData = async (id) => {
            if(confirm('Yakin ingin menghapus?')) {
                await EmployeeCRUD.delete(id);
                loadData();
            }
        };
    </script>
</body>
</html>
