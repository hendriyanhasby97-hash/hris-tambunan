<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pegawai - HRIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #sidebar-wrapper { width: 250px; transition: margin 0.25s ease-out; }
        .sidebar-hidden { margin-left: -250px; }
    </style>
</head>
<body class="bg-light">
    <div class="d-flex min-vh-100" id="wrapper">
        
        <div class="bg-dark text-white shadow-lg" id="sidebar-wrapper">
            <div class="p-3 border-bottom border-secondary text-center fw-bold fs-5">Sistem Pegawai</div>
            <div class="list-group list-group-flush mt-3">
                <a href="../index.html" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    Dashboard
                </a>
                
                <a href="#masterDataMenu" data-bs-toggle="collapse" class="list-group-item list-group-item-action bg-dark text-white border-0 d-flex justify-content-between align-items-center">
                    Master Data
                    <span class="small">▼</span>
                </a>
                <div class="collapse show" id="masterDataMenu">
                    <a href="index.html" class="list-group-item list-group-item-action bg-secondary text-white border-0 ps-5 active">
                        Data Pegawai
                    </a>
                    <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 ps-5">
                        Histori Pegawai Masuk
                    </a>
                    <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 ps-5">
                        Histori Pegawai Keluar
                    </a>
                </div>

                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    Kelengkapan Data
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    Berkas SDM
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0">
                    Pengaturan
                </a>
            </div>
        </div>

        <div class="w-100">
            <nav class="navbar navbar-light bg-white shadow-sm px-3 mb-4">
                <button class="btn btn-outline-dark btn-sm" id="btn-toggle">☰ Menu</button>
                <div class="d-flex align-items-center">
                    <span class="me-3 small text-secondary" id="user-display">Memuat user...</span>
                    <button class="btn btn-danger btn-sm" onclick="logoutApp('../../login.html')">Logout</button>
                </div>
            </nav>

            <div class="container-fluid px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>Manajemen Data Pegawai</h4>
                    <button class="btn btn-primary" id="btn-tambah" data-bs-toggle="modal" data-bs-target="#modalPegawai">
                        + Tambah Pegawai
                    </button>
                </div>

                <div class="card p-3 shadow-sm mb-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Pencarian</label>
                            <input type="text" id="search-input" class="form-control" placeholder="Cari berdasarkan NIK, Nama, atau Jabatan...">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Filter Status</label>
                            <select id="filter-status" class="form-select">
                                <option value="">Semua Status</option>
                                <option value="Aktif">Aktif</option>
                                <option value="Non-Aktif">Non-Aktif</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Filter Ruangan</label>
                            <select id="filter-ruangan" class="form-select">
                                <option value="">Semua Ruangan</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Filter Kelompok Tenaga</label>
                            <select id="filter-kelompok" class="form-select">
                                <option value="">Semua Kelompok</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>NIK</th>
                                    <th>Nama</th>
                                    <th>NIP</th>
                                    <th>Jabatan</th>
                                    <th>Ruangan</th>
                                    <th>Masa Kerja</th>
                                    <th class="text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <tr>
                                    <td colspan="7" class="text-center py-4 text-secondary">Memuat data pegawai...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPegawai" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <form id="form-pegawai" class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modal-title">Tambah Pegawai Baru</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="id_pegawai">

                    <ul class="nav nav-tabs mb-3" id="modalTab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="pribadi-tab" data-bs-toggle="tab" data-bs-target="#tab-pribadi" type="button">1. Data Pribadi</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="kepegawaian-tab" data-bs-toggle="tab" data-bs-target="#tab-kepegawaian" type="button">2. Data Kepegawaian</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="pendidikan-tab" data-bs-toggle="tab" data-bs-target="#tab-pendidikan" type="button">3. Pendidikan & Lainnya</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="modalTabContent">
                        <div class="tab-pane fade show active" id="tab-pribadi">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">NIK *</label>
                                    <input type="text" id="nik" class="form-control" required>
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label small fw-semibold">Nama Lengkap *</label>
                                    <input type="text" id="nama" class="form-control" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Jenis Kelamin</label>
                                    <select id="jeniskelamin" class="form-select">
                                        <option value="Pria">Pria</option>
                                        <option value="Wanita">Wanita</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Agama</label>
                                    <input type="text" id="agama" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Status Pernikahan</label>
                                    <select id="statuspernikahan" class="form-select">
                                        <option value="Belum Kawin">Belum Kawin</option>
                                        <option value="Kawin">Kawin</option>
                                        <option value="Cerai Hidup">Cerai Hidup</option>
                                        <option value="Cerai Mati">Cerai Mati</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Nama Pasangan (Suami/Istri)</label>
                                    <input type="text" id="pasangan" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Jumlah Anak</label>
                                    <input type="number" id="jumlahanak" class="form-control" value="0" min="0">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">No. HP</label>
                                    <input type="text" id="nohp" class="form-control">
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label small fw-semibold">Email</label>
                                    <input type="email" id="email" class="form-control">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label small fw-semibold">Alamat Lengkap</label>
                                    <textarea id="alamat" class="form-control" rows="2"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="tab-kepegawaian">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">NIP</label>
                                    <input type="text" id="nip" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Status Pegawai</label>
                                    <select id="status" class="form-select">
                                        <option value="Aktif">Aktif</option>
                                        <option value="Non-Aktif">Non-Aktif</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Kelompok Tenaga</label>
                                    <input type="text" id="kelompoktenaga" class="form-control" placeholder="Medis, Penunjang, Administrasi, dll">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Golongan / Pangkat</label>
                                    <input type="text" id="golongan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">TMT Pangkat</label>
                                    <input type="date" id="tmtpangkat" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">TMT Pangkat Lanjut</label>
                                    <input type="date" id="tmtplanjut" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Kelompok Jabatan</label>
                                    <input type="text" id="kelompokjabatan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Jabatan Struktural/Fungsional</label>
                                    <input type="text" id="jabatan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">TMT Jabatan</label>
                                    <input type="date" id="tmtjabatan" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">TMT CPNS</label>
                                    <input type="date" id="tmtcpns" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">BUP (Batas Usia Pensiun)</label>
                                    <input type="number" id="bup" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">TMT Pensiun</label>
                                    <input type="date" id="tmtpensiun" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Tanggal Masuk RS</label>
                                    <input type="date" id="masukrs" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Masa Kerja</label>
                                    <input type="text" id="masakerja" class="form-control" placeholder="Contoh: 5 Tahun 2 Bulan">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">Ruangan / Unit Kerja</label>
                                    <input type="text" id="ruangan" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-semibold">No. Tata Tugas</label>
                                    <input type="text" id="notatugas" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-semibold">TMT Tata Tugas</label>
                                    <input type="date" id="tmt" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="tab-pendidikan">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Jenjang Pendidikan</label>
                                    <input type="text" id="jpendidikan" class="form-control" placeholder="D3, S1, S2, dll">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Fakultas</label>
                                    <input type="text" id="fpendidikan" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Jurusan Spesifik</label>
                                    <input type="text" id="jrspendidikan" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Asal Institusi Pendidikan</label>
                                    <input type="text" id="asalpendidikan" class="form-control">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small fw-semibold">Tahun Lulus</label>
                                    <input type="number" id="tahunlulus" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">No. BPJS Kesehatan</label>
                                    <input type="text" id="bpjs" class="form-control">
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label small fw-semibold">No. BPJS TK / Taspen</label>
                                    <input type="text" id="bpjstktaspen" class="form-control">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-semibold">NPWP</label>
                                    <input type="text" id="npwp" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-success" id="btn-simpan">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="modalDetailPegawai" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Biodata Lengkap Pegawai</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered mb-0 small">
                            <tbody id="detail-view-body">
                                </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="../../App/App.js"></script>

    <script type="module" src="employee.js"></script>
    <script>
        // Logika Hide/Show Sidebar Menu
        document.getElementById('btn-toggle').addEventListener('click', () => {
            document.getElementById('sidebar-wrapper').classList.toggle('sidebar-hidden');
        });
    </script>
</body>
</html>
