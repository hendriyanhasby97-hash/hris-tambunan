<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data Pegawai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #sidebar-wrapper { width: 250px; transition: margin 0.25s ease-out; }
        .sidebar-hidden { margin-left: -250px; }
    </style>
</head>
<body class="bg-light">
    <div class="d-flex min-vh-100" id="wrapper">
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="p-3 border-bottom text-center fw-bold fs-5">Sistem Pegawai</div>
            <div class="list-group list-group-flush mt-3">
                <a href="../index.html" class="list-group-item list-group-item-action bg-dark text-white">Dashboard</a>
                <a href="index.html" class="list-group-item list-group-item-action bg-dark text-white active border-0">Data Pegawai</a>
                <a href="../Pengaturan/index.html" class="list-group-item list-group-item-action bg-dark text-white">Pengaturan</a>
            </div>
        </div>

        <div class="w-100">
            <nav class="navbar navbar-light bg-white shadow-sm px-3 mb-4">
                <button class="btn btn-outline-dark btn-sm" id="btn-toggle">☰ Menu</button>
                <button class="btn btn-danger btn-sm" onclick="logoutApp('../index.html')">Logout</button>
            </nav>

            <div class="container-fluid px-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>📋 Manajemen Data Pegawai</h4>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPegawai" id="btn-tambah-pegawai">➕ Tambah Pegawai</button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>NIP</th>
                                    <th>Nama Pegawai</th>
                                    <th>Jabatan</th>
                                    <th>Ruangan</th>
                                    <th>Masa Kerja</th>
                                    <th>TMT Pensiun</th>
                                    <th class="text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-pegawai">
                                <tr><td colspan="7" class="text-center text-muted">Memuat data pegawai...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPegawai" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Form Data Pegawai</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-shadow="none" data-bs-content="close" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-pegawai">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nama Lengkap</label>
                                <input type="text" id="emp-nama" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">NIP</label>
                                <input type="text" id="emp-nip" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Sesi</label>
                                <input type="email" id="emp-email" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Jenis Kelamin</label>
                                <select id="emp-jeniskelamin" class="form-select" required>
                                    <option value="Pria">Pria</option>
                                    <option value="Wanita">Wanita</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3"><label class="form-label">Agama</label>
                                <select id="emp-agama" class="form-select master-drop" data-kategori="Agama" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Kelompok Tenaga</label>
                                <select id="emp-kelompok-tenaga" class="form-select master-drop" data-kategori="Kelompok Tenaga" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Golongan Pangkat</label>
                                <select id="emp-golongan-pangkat" class="form-select master-drop" data-kategori="Golongan Pangkat" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Kelompok Jabatan</label>
                                <select id="emp-kelompok-jabatan" class="form-select master-drop" data-kategori="Kelompok Jabatan" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Jabatan</label>
                                <select id="emp-jabatan" class="form-select master-drop" data-kategori="Jabatan" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">BUP (Batas Usia Pensiun)</label>
                                <select id="emp-bup" class="form-select master-drop" data-kategori="BUP" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Ruangan</label>
                                <select id="emp-ruangan" class="form-select master-drop" data-kategori="Ruangan" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Jenjang Pendidikan</label>
                                <select id="emp-jenjang" class="form-select master-drop" data-kategori="Jenjang" required></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Fakultas</label>
                                <select id="emp-fakultas" class="form-select master-drop" data-kategori="Fakultas"></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Jurusan</label>
                                <select id="emp-jurusan" class="form-select master-drop" data-kategori="Jurusan"></select></div>
                            <div class="col-md-4 mb-3"><label class="form-label">Asal Pendidikan</label>
                                <select id="emp-asal-pendidikan" class="form-select master-drop" data-kategori="Asal Pendidikan"></select></div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tanggal Lahir</label>
                                <input type="date" id="emp-tanggal-lahir" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">TMT Pensiun (Otomatis)</label>
                                <input type="date" id="emp-tmt-pensiun" class="form-control bg-light" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tanggal Masuk RS</label>
                                <input type="date" id="emp-tanggal-masuk" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Masa Kerja (Otomatis)</label>
                                <input type="text" id="emp-masa-kerja" class="form-control bg-light" readonly placeholder="Akan terhitung otomatis">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary">Simpan Pegawai</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('btn-toggle').addEventListener('click', () => {
            document.getElementById('sidebar-wrapper').classList.toggle('sidebar-hidden');
        });
    </script>
    
    <script type="module" src="../../App/App.js"></script>
    <script type="module">
        import { supabase } from '../../App/koneksi.js';

        // 1. Ambil opsi Dropdown dari tabel pengaturan
        async function muatDropdownPengaturan() {
            const { data, error } = await supabase.from('pengaturan_dropdown').select('kategori, nilai').order('nilai', { ascending: true });
            if (error) return console.error('Error load dropdown:', error);

            document.querySelectorAll('.master-drop').forEach(select => {
                const kategori = select.getAttribute('data-kategori');
                const opsiFilter = data.filter(item => item.kategori === kategori);

                select.innerHTML = `<option value="">-- Pilih ${kategori} --</option>`;
                opsiFilter.forEach(opsi => {
                    const opt = document.createElement('option');
                    opt.value = opsi.nilai;
                    opt.textContent = opsi.nilai;
                    select.appendChild(opt);
                });
            });
        }

        // 2. Perhitungan TMT Pensiun (Tanggal Lahir + BUP = Tanggal 1 Bulan Berikutnya)
        function kalkulasiTMTPensiun() {
            const tglLahirInput = document.getElementById('emp-tanggal-lahir').value;
            const bupInput = document.getElementById('emp-bup').value;
            const tmtField = document.getElementById('emp-tmt-pensiun');

            if (!tglLahirInput || !bupInput) {
                tmtField.value = '';
                return;
            }

            const tglLahir = new Date(tglLahirInput);
            const bupTahun = parseInt(bupInput);

            let tahunPensiun = tglLahir.getFullYear() + bupTahun;
            let bulanPensiun = tglLahir.getMonth() + 1; // +1 untuk lompat ke bulan berikutnya

            // Membuat objek tanggal pada tanggal 1 di bulan berikutnya tersebut
            const hasilTmt = new Date(tahunPensiun, bulanPensiun, 1);
            
            // Format ke format YYYY-MM-DD
            tmtField.value = hasilTmt.toISOString().split('T')[0];
        }

        // 3. Perhitungan Masa Kerja (Tanggal Masuk RS s/d Hari ini)
        function kalkulasiMasaKerja() {
            const tglMasukInput = document.getElementById('emp-tanggal-masuk').value;
            const masaKerjaField = document.getElementById('emp-masa-kerja');

            if (!tglMasukInput) {
                masaKerjaField.value = '';
                return;
            }

            const tglMasuk = new Date(tglMasukInput);
            const sekarang = new Date();

            let tahun = sekarang.getFullYear() - tglMasuk.getFullYear();
            let bulan = sekarang.getMonth() - tglMasuk.getMonth();

            if (bulan < 0) {
                tahun--;
                bulan += 12;
            }

            masaKerjaField.value = `${tahun} Tahun ${bulan} Bulan`;
        }

        // 4. Ambil dan Tampilkan Data Pegawai ke Tabel
        async function ambilDataPegawai() {
            const { data, error } = await supabase.from('employee').select('*').order('nama', { ascending: true });
            const tbody = document.getElementById('tabel-pegawai');
            tbody.innerHTML = '';

            if(error || !data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted">Belum ada data pegawai.</td></tr>`;
                return;
            }

            data.forEach(emp => {
                // Hitung masa kerja real-time untuk tampilan tabel
                let mkText = '-';
                if(emp.tanggal_masuk) {
                    const tm = new Date(emp.tanggal_masuk);
                    const now = new Date();
                    let th = now.getFullYear() - tm.getFullYear();
                    let bl = now.getMonth() - tm.getMonth();
                    if(bl < 0) { th--; bl += 12; }
                    mkText = `${th} Thn ${bl} Bln`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${emp.nip || '-'}</td>
                    <td><b>${emp.nama}</b><br><small class="text-muted">${emp.email}</small></td>
                    <td>${emp.jabatan || '-'}</td>
                    <td>${emp.ruangan || '-'}</td>
                    <td>${mkText}</td>
                    <td><span class="text-danger fw-bold">${emp.tmt_pensiun || '-'}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-danger btn-hapus-emp" data-id="${emp.id_pegawai}">Hapus</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.btn-hapus-emp').forEach(b => {
                b.addEventListener('click', async (e) => {
                    if(confirm('Hapus permanen data pegawai ini?')) {
                        const id = e.target.getAttribute('data-id');
                        await supabase.from('employee').delete().eq('id_pegawai', id);
                        ambilDataPegawai();
                    }
                });
            });
        }

        // 5. Simpan Data Pegawai Baru
        document.getElementById('form-pegawai').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                nama: document.getElementById('emp-nama').value,
                nip: document.getElementById('emp-nip').value,
                email: document.getElementById('emp-email').value,
                jeniskelamin: document.getElementById('emp-jeniskelamin').value,
                agama: document.getElementById('emp-agama').value,
                kelompok_tenaga: document.getElementById('emp-kelompok-tenaga').value,
                golongan_pangkat: document.getElementById('emp-golongan-pangkat').value,
                kelompok_jabatan: document.getElementById('emp-kelompok-jabatan').value,
                jabatan: document.getElementById('emp-jabatan').value,
                bup: document.getElementById('emp-bup').value,
                ruangan: document.getElementById('emp-ruangan').value,
                jenjang: document.getElementById('emp-jenjang').value,
                fakultas: document.getElementById('emp-fakultas').value,
                jurusan: document.getElementById('emp-jurusan').value,
                asal_pendidikan: document.getElementById('emp-asal-pendidikan').value,
                tanggal_lahir: document.getElementById('emp-tanggal-lahir').value,
                tmt_pensiun: document.getElementById('emp-tmt-pensiun').value,
                tanggal_masuk: document.getElementById('emp-tanggal-masuk').value
            };

            const { error } = await supabase.from('employee').insert([payload]);
            if(error) {
                alert('Gagal menyimpan pegawai: ' + error.message);
            } else {
                alert('Berhasil menyimpan data pegawai!');
                document.getElementById('form-pegawai').reset();
                bootstrap.Modal.getInstance(document.getElementById('modalPegawai')).hide();
                ambilDataPegawai();
            }
        });

        // Event Listener Real-time calculation
        document.getElementById('emp-tanggal-lahir').addEventListener('change', kalkulasiTMTPensiun);
        document.getElementById('emp-bup').addEventListener('change', kalkulasiTMTPensiun);
        document.getElementById('emp-tanggal-masuk').addEventListener('change', kalkulasiMasaKerja);

        // Init load
        document.addEventListener('DOMContentLoaded', () => {
            muatDropdownPengaturan();
            ambilDataPegawai();
        });
    </script>
</body>
</html>
